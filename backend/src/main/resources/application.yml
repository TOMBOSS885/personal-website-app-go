server:
  port: 8080

spring:
  application:
    name: personal-website
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/personal_website?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-generation-min-32-characters}
  expiration: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: http://localhost:3000,http://localhost:5173

logging:
  level:
    com.personal.website: DEBUG

app:
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}
