# Production configuration
spring:
  application:
    name: personal-website
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/personal_website?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: 8080
  address: 0.0.0.0

jwt:
  secret: ${JWT_SECRET:please-change-this-secret-key-at-least-32-chars}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: INFO
    com.personal.website: INFO
  file:
    name: /var/log/supervisor/application.log
