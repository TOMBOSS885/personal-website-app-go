services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: personal-website-go:latest
    container_name: personal-website-go
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/var/log/supervisor
    environment:
      SERVER_PORT: 8080
      GIN_MODE: release
      APP_UPLOAD_DIR: /app/uploads
      AUTO_MIGRATE: "${AUTO_MIGRATE:-true}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-*}"
      MYSQL_HOST: "${MYSQL_HOST:-127.0.0.1}"
      MYSQL_PORT: "${MYSQL_PORT:-3306}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-personal_website}"
      MYSQL_USERNAME: "${MYSQL_USERNAME:-root}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      JWT_EXPIRATION: "${JWT_EXPIRATION:-86400000}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@example.com}"
      ADMIN_RESET_PASSWORD: "${ADMIN_RESET_PASSWORD:-false}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/public/profile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
