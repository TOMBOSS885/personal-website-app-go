services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: personal-website-go:latest
    container_name: personal-website-go
    restart: unless-stopped
    network_mode: host
    extra_hosts:
      - "host.docker.internal:127.0.0.1"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/var/log/supervisor
    environment:
      SERVER_PORT: 8080
      SERVER_HOST: 127.0.0.1
      GIN_MODE: release
      APP_UPLOAD_DIR: /app/uploads
      AUTO_MIGRATE: "${AUTO_MIGRATE:-true}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
      MYSQL_HOST: "${MYSQL_HOST:-127.0.0.1}"
      MYSQL_PORT: "${MYSQL_PORT:-3306}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-personal_website}"
      MYSQL_USERNAME: "${MYSQL_USERNAME:-root}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}"
      MYSQL_TIMEOUT: "${MYSQL_TIMEOUT:-10s}"
      MYSQL_READ_TIMEOUT: "${MYSQL_READ_TIMEOUT:-30s}"
      MYSQL_WRITE_TIMEOUT: "${MYSQL_WRITE_TIMEOUT:-30s}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      JWT_EXPIRATION: "${JWT_EXPIRATION:-86400000}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@example.com}"
      ADMIN_RESET_PASSWORD: "${ADMIN_RESET_PASSWORD:-false}"
      REDIS_ENABLED: "${REDIS_ENABLED:-false}"
      REDIS_ADDR: "${REDIS_ADDR:-127.0.0.1:6379}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "${REDIS_DB:-0}"
      CACHE_ENABLED: "${CACHE_ENABLED:-true}"
      CACHE_TTL_SECONDS: "${CACHE_TTL_SECONDS:-60}"
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"
      PUBLIC_RATE_LIMIT_PER_MINUTE: "${PUBLIC_RATE_LIMIT_PER_MINUTE:-180}"
      MUSIC_RATE_LIMIT_PER_MINUTE: "${MUSIC_RATE_LIMIT_PER_MINUTE:-90}"
      MUSIC_STREAM_RATE_LIMIT_PER_MINUTE: "${MUSIC_STREAM_RATE_LIMIT_PER_MINUTE:-240}"
      LOGIN_LIMIT_MAX_FAILS: "${LOGIN_LIMIT_MAX_FAILS:-5}"
      LOGIN_LIMIT_WINDOW_SECONDS: "${LOGIN_LIMIT_WINDOW_SECONDS:-600}"
      MEDIA_SIGN_SECRET: "${MEDIA_SIGN_SECRET:-}"
      MEDIA_URL_TTL_SECONDS: "${MEDIA_URL_TTL_SECONDS:-600}"
      ARTICLE_SITE_URL_TTL_SECONDS: "${ARTICLE_SITE_URL_TTL_SECONDS:-3600}"
      DB_MAX_IDLE_CONNS: "${DB_MAX_IDLE_CONNS:-10}"
      DB_MAX_OPEN_CONNS: "${DB_MAX_OPEN_CONNS:-50}"
      DB_CONN_MAX_LIFETIME_MINUTES: "${DB_CONN_MAX_LIFETIME_MINUTES:-55}"
      DB_CONNECT_RETRIES: "${DB_CONNECT_RETRIES:-10}"
      DB_CONNECT_RETRY_DELAY_SECONDS: "${DB_CONNECT_RETRY_DELAY_SECONDS:-3}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-Personal Website}"
      SMTP_TLS_MODE: "${SMTP_TLS_MODE:-starttls}"
      EMAIL_CODE_TTL_SECONDS: "${EMAIL_CODE_TTL_SECONDS:-600}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3718/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
